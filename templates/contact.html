<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/contact.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Neon-style flash message */
        .flash-message {
            background: rgba(0, 255, 150, 0.1);
            border: 2px solid #00ff96;
            color: #00ff96;
            font-weight: 600;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px auto;
            max-width: 400px;
            box-shadow: 0 0 15px #00ff96, 0 0 30px rgba(0,255,150,0.5);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-image">
    </div>
    <ul class="nav-links">
        <li><a href="{{ url_for('index') }}">Back to Home</a></li>
    </ul>
    <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="theme-toggle" id="theme-toggle">
        <i class="fas fa-palette"></i>
    </div>
</div>

<div class="container">
    <h1 class="title">Contact <span>Us</span></h1>
    <p class="subtitle">We'd love to hear from you!</p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-message">{{ messages[0] }}</div>
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('contact') }}" method="POST" class="contact-form">
        <div class="input-group">
            <input type="text" name="name" placeholder="Your Name" required>
        </div>
        <div class="input-group">
            <input type="email" name="email" placeholder="Your Email" required>
        </div>
        <div class="input-group">
            <textarea name="message" placeholder="Your Message" required></textarea>
        </div>
        <button type="submit" class="btn-send">Send Message</button>
    </form>
</div>

<!-- GSAP Animations -->
<script>
gsap.from(".title", { y: -50, opacity: 0, duration: 1 });
gsap.from(".subtitle", { y: -20, opacity: 0, duration: 1, delay: 0.5 });
gsap.from(".input-group", { x: -100, opacity: 0, duration: 1, stagger: 0.2, delay: 1 });
gsap.from(".btn-send", { scale: 0, opacity: 0, duration: 0.8, delay: 1.5 });
</script>

<!-- Hamburger Menu -->
<script>
const hamburger = document.querySelector(".hamburger");
const navLinks = document.querySelector(".nav-links");

hamburger.addEventListener("click", () => {
    navLinks.classList.toggle("active");
    hamburger.classList.toggle("active");
});
</script>

<!-- Neon Flash Auto-hide -->
<script>
window.addEventListener('DOMContentLoaded', () => {
    const flash = document.querySelector('.flash-message');
    if(flash) {
        setTimeout(() => {
            flash.style.opacity = '0';
            flash.style.transform = 'translateY(-20px)';
            setTimeout(() => flash.remove(), 600); // remove after fade
        }, 2000); // hide after 4 seconds
    }
});
</script>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</body>
</html>
