<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | FYP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   
</head>
<body>
 
<div class="theme-toggle" id="theme-toggle">
    <i class="fas fa-palette"></i>
</div>

<div class="container">
 {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

    <h2 class="title">Sign Up</h2>
<form method="POST" action="{{ url_for('signup') }}" id="signupForm">
    <div class="input-box">
        <input type="text" name="username" placeholder="username">
    </div>

    <div class="input-box">
        <input type="email" name="email" placeholder="email">
    </div>

    <div class="input-box">
        <input id="signup-pass" type="password" name="password" placeholder="password">
        <i id="signup-eye" onclick="togglePassword('signup-pass','signup-eye')">👁️</i>
    </div>


    <button type="submit" class="btn">CREATE ACCOUNT</button>
    </form>

    <p class="bottom-text">
        Already have an account? <a href="{{ url_for('login') }}">login</a>
    </p>
</div>
    

<script>
// Clear form fields on page load
document.addEventListener('DOMContentLoaded', () => {
    const signupForm = document.getElementById('signupForm');
    if (signupForm) {
        signupForm.reset();
    }
});

function togglePassword(inputId, iconId) {
    const passwordInput = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.textContent = '🙈';
    } else {
        passwordInput.type = 'password';
        icon.textContent = '👁️';
    }
}
</script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
